<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - El Estudiante Feliz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center text-success mb-3">📝 Registro de Cliente</h3>
        <p class="text-center text-muted small">Crea tu cuenta para comprar en la papelería</p>

        {% if error %}
            <div class="alert alert-danger p-2 text-center" style="font-size: 14px;">{{ error }}</div>
        {% endif %}

        <form action="/registro" method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text" class="form-control" name="nombre" placeholder="Ej. Suleima Salcedo" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Elige un Usuario</label>
                <input type="text" class="form-control" name="usuario" placeholder="Ej. sule_cliente" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="contrasena" placeholder="Crea una contraseña" required>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-2">Registrarme e Iniciar Sesión</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none small">Volver al inicio de sesión</a>
        </div>
    </div>
</body>
</html>
